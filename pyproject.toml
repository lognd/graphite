[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
# graphite: the drawing mineral, for the drawing-and-driving surface
# (WO-59, AD-31/D163-D165). Own distribution over the regolith wheel --
# the regolith-ls / editors/vscode precedent keeps the wheel lean.
name = "graphite"
version = "0.2.0"
description = "graphite: the regolith interaction surface (config TUI + local-web GUI)"
requires-python = ">=3.12"
license = { text = "GPL-2.0-only" }
dependencies = [
    "regolith",
    "textual>=0.58",
    "pydantic>=2",
    "typani",
    "fastapi>=0.115",
    "uvicorn>=0.30",
    "sse-starlette>=2.1",
    "python-multipart>=0.0.9",
]

[project.scripts]
graphite = "graphite.cli:app"

[tool.uv.sources]
# Editable path dependency onto the sibling lithos checkout's wheel
# (dev convenience, the feldspar posture); `make install` wires this up.
regolith = { path = "../lithos", editable = true }

[tool.hatch.build.targets.wheel]
packages = ["graphite"]
# The vite build output is gitignored (regenerated by `make build`), and
# hatchling respects VCS ignores by default -- `artifacts` forces the
# bundled frontend INTO the wheel so `graphite serve` works with no Node
# on the target machine (WO-G8 deliverable 6, spec 02.5).
artifacts = ["graphite/server/static/**"]

[dependency-groups]
dev = [
    "pytest",
    "pytest-asyncio",
    "httpx>=0.27",
    "ty>=0.0.57",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
