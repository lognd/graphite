check_base = "main"

[graph]
# frontend/** (entire tree, not just build/vendor output) is excluded from
# the obligation graph as of 2026-07-18 (T-0013): the frontend has its own
# complete toolchain (`make frontend-check` -- lint, typecheck, its own
# TS/React test runner). frob's obligation graph and its pytest-based
# evidence oracle are Python-only today and cannot bind TS tests, so the
# 87 TEST002 + 8 TEST003 + 5 COV001 findings under frontend/ were noise,
# not real debt. Revisit only if frob grows a first-class TS test runner
# (see T-0013 for the reopen criterion).
exclude = [
    "frontend/**",
    "graphite/server/static/**",
    "tests/fixtures/**",
    ".worktrees/**",
]

[check]
# frontend/ is TypeScript/React (Node toolchain, its own lint/typecheck/test
# via `make frontend-check`); frob's ruff/ty/cycle/dup/bind/exports stages
# are Python-only and have nothing to check there, so no skip is needed for
# them specifically -- `graph.exclude` above already keeps frontend build
# and vendor output out of the obligation graph.
#
# ty is skipped: 2 pre-existing diagnostics (tests/service/test_config_cli.py
# and tests/service/test_runs.py) predate frob adoption -- one relies on a
# `# type: ignore[arg-type]` comment written for mypy, which ty does not
# honor, the other is a real narrowing gap ty catches that the repo's own
# `make typecheck` (also ty) already lets through unfixed on main. Adoption
# must not touch source; see tickets/ for the seeded ticket tracking this.
skip = ["ty"]

[gates.severity]
# Legacy-adoption baseline: graphite predates frob, so the snapshot-wide
# annotation-coverage obligations warn on the un-annotated legacy surface
# rather than blocking; diff-scoped and drift rules stay hard errors.
# Ratchet stage 1 (2026-07-19): annotation surface at zero unwaived
# violations -- structural coverage rules flip to hard errors; count/
# coverage-flow rules stay warn (T-0020 tracks the coverage backfill).
COV001 = "error"
TEST001 = "error"
TEST002 = "warn"
TEST003 = "error"
TEST005 = "warn"
TEST006 = "warn"
DOC001 = "error"

[gates.docs]
# T-0002 retrofit (2026-07-19), following the feldspar precedent:
# docs/README.md (new -- "File index") links every docs/spec/*.md and
# points at docs/workflow/README.md; docs/workflow/README.md got a new
# "Work order index" section linking every workflow/work-orders/WO-Gnn-*.md.
# Every file under docs/ is now reachable from a root. DOC001 is the
# default include glob at error severity, matching the COV001/TEST001/
# TEST003 ratchet above -- no more blanket disable. `docs/README.md` is
# not literally `docs/index.md` (frob's built-in default root), so it is
# named explicitly in `roots` alongside the repo `README.md`.
include = ["docs/**/*.md"]
roots = ["docs/README.md", "README.md"]

[testing]
min_unit_cases = 1
min_integration = 1
# Floors below record measured reality as of 2026-07-19 (T-0020 backfill,
# then T-0022 wave 2 on top of it):
#   T-0020: real branch-covering tests added for all 9 previously-waived
#   sites -- config_cli.doctor; reports.read_staged_build_report/
#   read_calc_book/read_audit_index/read_acceptance_ledger/read_manifest/
#   read_gate_summary; runs.mark_finished/cancel_run.
#   T-0022: closed the 3 residue sites T-0020 named but left out of scope
#   -- service/settings.py::get_settings (60% -> clears 75, malformed-JSON
#   /invalid-shape/unreadable-file branches), ::set_settings (70% ->
#   clears 75, write-failure branch), tui/screens/run_console.py::
#   RunConsoleScreen.on_button_pressed (60% -> clears 75, run-cancel
#   click + unknown-button-id branches). Every `frob:waive TEST005`
#   removed; zero TEST005 waivers remain in the tree.
#   unit_branch_cov: stays at 75 (raised 60 -> 75 under T-0020). All 12
#   backfilled sites across both tickets now clear it with real tests.
#   90 was re-tried under T-0022 and rejected again as overreach: it
#   still drags in ~30 functions across server/routes and tui screens
#   that neither T-0020 nor T-0022 touched, which would misrepresent
#   this backfill's actual scope -- 75 is the honest ceiling for the
#   sites actually covered.
#   module_line_cov: unchanged at 80. Worst module measured is now
#   graphite/tui/screens/config.py at 81.9% -- comfortably above 80,
#   with no module-level TEST005 warnings at this floor.
#   system_line_cov: overall measured line coverage is 92.9%, already
#   well above the existing 80 floor, so it is left unchanged.
unit_branch_cov = 75
module_line_cov = 80
system_line_cov = 80

[[test.runner]]
language = "python"
command = ["uv", "run", "pytest", "-q", "{ids}"]
all_command = ["uv", "run", "pytest", "-q"]
cwd = "."

# WO-159 companion (T-0021, AD-44): regolith.surface is the ONE
# sanctioned import surface for external UIs (lithos charter
# docs/spec/toolchain/44-boundary-charter.md sec. 4). These five rules
# ban reaching past it into regolith's internal layers from anywhere
# under graphite/**. regolith.backends still has pre-existing direct
# imports (CalcBook/AuditIndex/AuditRow/AuditSummary/CalcSheet are not
# yet in the facade's sanctioned set -- WO-159 non-goals: no new read
# capability was added by that WO) -- each waived per-site with
# `frob:waive FI-BACKENDS reason="..."` naming the facade-addition gap
# explicitly rather than narrowing this rule's `within` glob to make
# the gap invisible.
[[policy.forbidden-import]]
id = "FI-ORCHESTRATOR"
kind = "forbidden-import"
module = "regolith.orchestrator"
within = "graphite/**"
reason = "import regolith.surface instead (AD-44); regolith.orchestrator is an internal L2 module, not the sanctioned UI read surface"

[[policy.forbidden-import]]
id = "FI-HARNESS"
kind = "forbidden-import"
module = "regolith.harness"
within = "graphite/**"
reason = "regolith.harness (the solve/evidence engine) is never a UI dependency (AD-44); import regolith.surface for any read need"

[[policy.forbidden-import]]
id = "FI-REALIZER"
kind = "forbidden-import"
module = "regolith.realizer"
within = "graphite/**"
reason = "regolith.realizer is an internal L3 module, not the sanctioned UI read surface (AD-44); import regolith.surface instead"

[[policy.forbidden-import]]
id = "FI-BACKENDS"
kind = "forbidden-import"
module = "regolith.backends"
within = "graphite/**"
reason = "import regolith.surface instead (AD-44) for the D244 artifact index; other regolith.backends models not yet in the facade are a reviewed facade-addition, not a direct import -- see per-site frob:waive FI-BACKENDS comments for the named gaps"

[[policy.forbidden-import]]
id = "FI-COMPILER"
kind = "forbidden-import"
module = "regolith.compiler"
within = "graphite/**"
reason = "regolith.compiler is the AD-4 FFI door, never a UI dependency (AD-44); import regolith.surface for any read need"
